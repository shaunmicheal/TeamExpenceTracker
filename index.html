<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="styles.css">
    <title>Team Expense Tracker</title>
</head>
<body>

<div class="container">
<div class="header">
<h1> Team Expense Tracker</h1>
<h2> Welcome to my <span>Team Expense Tracker</span></h2>
</div>

<form id = "expenseForm">
<div>
        <label for="personName">Person's name</label>
        <input type="text" id="personName" required placeholder="Enter Your Name">    
</div>

<div> 
        <label for="amount">Amount</label>
        <input type="number" id="amount" required placeholder="Enter Amount" step="0.01">
</div>

<div>
        <label for ="category">Category</label>
        <select id ="category">
          <option value = "">Select a category</option>
          <option value = "Food">Food</option>
          <option value = "Transport">Transport</option>
          <option value = "Entertainment">Entertainment</option>
          <option value = "Other">Other</option>
        </select>
</div>
<button type="submit">Add Expense</button>
</form>

<div class="stats">
  <div class="stat-card">
   <p>Total Spent</p>
   <h2 id="totalAmount">$0.00</h2>
    </div>
    <div class="stat-card">
      <p>Expenses</p>
      <h2 id="totalCount">0</h2>
    </div>
  </div>

<div class="expenseHistory">
<h3>Recent Expenses</h3>
<ul id="expenseList">
<li>No expenses recorded yet. Add one to get started!</li>
</ul>
</div>
</div>

<footer>
  <p>&copy; 2023 Team Expense Tracker. All rights reserved. Shaun Jeranyama</p>
</footer>
<script src = "script.js"></script>    
</body>
</html>
